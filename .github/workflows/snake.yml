# This workflow generates a snake animation from a GitHub user's contributions graph and pushes it to a separate branch.
# The animation is then displayed in the profile README.

name: Generate Snake

on:
  # Schedule updates every 12 hours to keep the contribution grid fresh
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual triggering of the workflow from the Actions tab
  workflow_dispatch:
  # Run the workflow on every push to the main branch
  push:
    branches:
    - main

# Permissions required for the workflow to write to the repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository to the runner
      - name: Checkout
        uses: actions/checkout@v3

      # Step 2: Generate the snake SVGs using the Platane/snk action
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # The GitHub user name to fetch contributions for
          github_user_name: ${{ github.repository_owner }}

          # Professional "Radical" themed customization:
          # - color_snake: Vibrant pink to match your profile accents
          # - color_dots: Custom gradient of purples/blues for a modern aesthetic
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#fe428e&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#fe428e&color_dots=#161b22,#4b0082,#8a2be2,#9370db,#e6e6fa
        env:
          # GitHub Token required to fetch contribution data
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Push the generated SVG files to a separate 'output' branch
      # This branch will serve the files via GitHub Pages or raw content URLs.
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          # GitHub Token required to push changes back to the repository
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
